<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050816">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFE OS">
<title>LIFE OS</title>
<link rel="manifest" href="manifest.json">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- External libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Styles -->
<link rel="stylesheet" href="css/base.css?v=79">
<link rel="stylesheet" href="css/components.css?v=79">
<link rel="stylesheet" href="css/screens.css?v=79">
<link rel="stylesheet" href="css/desktop.css?v=79">
<link rel="stylesheet" href="css/liquid-glass.css?v=79">

<style>body{background:#050511}</style>
</head>
<body>

<!-- Liquid Glass — фон-аврора (6 размытых орбов) -->
<div class="ambient" aria-hidden="true">
  <span class="orb" style="--c:rgba(45,226,197,.85);  top:-16%; left:-10%;  --size:48vw; --anim:orb1 20s"></span>
  <span class="orb" style="--c:rgba(139,92,246,.9);   top:-8%;  right:-8%;  --size:44vw; --anim:orb2 24s"></span>
  <span class="orb" style="--c:rgba(0,201,255,.7);    top:28%;  left:16%;   --size:42vw; --anim:orb3 28s"></span>
  <span class="orb" style="--c:rgba(255,92,138,.66);  bottom:-18%; left:30%; --size:46vw; --anim:orb1 26s"></span>
  <span class="orb" style="--c:rgba(255,180,84,.6);   bottom:-12%; right:4%; --size:40vw; --anim:orb2 30s"></span>
  <span class="orb" style="--c:rgba(255,255,255,.28); top:44%; right:30%;    --size:26vw; --anim:orb3 22s"></span>
</div>

<div id="app">
  <div id="content"></div>

  <!-- Bottom Navigation -->
  <nav>
    <button class="nav-btn active" data-tab="dash" onclick="goTab(this,'dash')">
      <span class="icon">⚡</span><span class="lbl">Главная</span>
    </button>
    <button class="nav-btn" data-tab="tasks" onclick="goTab(this,'tasks')">
      <span class="icon">✅</span><span class="lbl">Задачи</span>
    </button>
    <button class="nav-btn" data-tab="health" onclick="goTab(this,'health')">
      <span class="icon">💪</span><span class="lbl">Здоровье</span>
    </button>
    <button class="nav-btn" data-tab="content" onclick="goTab(this,'content')">
      <span class="icon">🎬</span><span class="lbl">Контент</span>
    </button>
    <button class="nav-btn" data-tab="projects" onclick="goTab(this,'projects')">
      <span class="icon">🚀</span><span class="lbl">Проекты</span>
    </button>
    <button class="nav-btn" data-tab="people" onclick="goTab(this,'people')">
      <span class="icon">👥</span><span class="lbl">Люди</span>
    </button>
    <button class="nav-btn" data-tab="money" onclick="goTab(this,'money')">
      <span class="icon">💰</span><span class="lbl">Деньги</span>
    </button>
  </nav>
</div>

<!-- FAB -->
<button id="fab" aria-label="Голосовой ввод">🎙️</button>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Глобальный error-показ (для отладки на телефоне без DevTools) -->
<script>
  window.addEventListener('error', e => {
    const c = document.getElementById('content');
    if (c) c.innerHTML = `<div style="padding:20px;color:#FF4560;font-family:monospace;font-size:11px;word-break:break-word">
      <div style="font-weight:700;margin-bottom:8px">⚠️ JS ERROR</div>
      <div style="margin-bottom:6px">${e.message}</div>
      <div style="color:#999;font-size:10px">${e.filename?.split('/').pop()}:${e.lineno}:${e.colno}</div>
      <div style="margin-top:10px;font-size:10px;color:#666;white-space:pre-wrap">${e.error?.stack || ''}</div>
    </div>`;
  });
  window.addEventListener('unhandledrejection', e => {
    const c = document.getElementById('content');
    if (c) c.innerHTML = `<div style="padding:20px;color:#FF9F43;font-family:monospace;font-size:11px;word-break:break-word">
      <div style="font-weight:700;margin-bottom:8px">⚠️ PROMISE REJECTED</div>
      <div>${e.reason?.message || e.reason}</div>
      <div style="margin-top:10px;font-size:10px;color:#666;white-space:pre-wrap">${e.reason?.stack || ''}</div>
    </div>`;
  });
</script>

<!-- App bootstrap -->
<script type="module" src="js/app.js?v=79"></script>
<script>
  // Stub until module loads (module will override with real implementation)
  window.goTab = function(btn, tab) {};
</script>

</body>
</html>
